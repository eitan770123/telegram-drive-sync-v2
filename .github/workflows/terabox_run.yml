name: TeraBox Smart Gap Scanner

on:
  workflow_dispatch:

jobs:
  smart-scan-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install telethon google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Create Smart Scanner Script
        run: |
          cat << 'EOF' > terabox_smart_scanner.py
          import os, re, asyncio, json, sys, requests
          from telethon import TelegramClient
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from difflib import SequenceMatcher

          # --- הגדרות ---
          API_ID = int(os.environ['TG_API_ID'])
          API_HASH = os.environ['TG_API_HASH']
          MAIN_CHANNEL = os.environ['MAIN_CHANNEL']
          DRIVE_FOLDER_ID = os.environ['DRIVE_FOLDER_ID']
          COOKIES_CONTENT = os.environ.get('TERABOX_COOKIES_FILE')
          
          # סריקה של כל הערוץ
          LIMIT_MSG = None

          sys.stdout.reconfigure(encoding='utf-8')

          # --- פענוח קוקיז ---
          if not COOKIES_CONTENT:
              print(">>> ❌ שגיאה: הסוד TERABOX_COOKIES_FILE חסר!")
              sys.exit(1)

          def parse_cookies(content):
              cookies = {}
              for line in content.splitlines():
                  if line.startswith('#') or not line.strip(): continue
                  parts = line.split('\t')
                  if len(parts) >= 7:
                      cookies[parts[5]] = parts[6].strip()
              return cookies

          COOKIE_DICT = parse_cookies(COOKIES_CONTENT)
          
          # --- חיבור לגוגל דרייב ---
          try:
              token_data = json.loads(os.environ['GOOGLE_TOKEN'])
              creds = Credentials.from_authorized_user_info(token_data)
              drive_service = build('drive', 'v3', credentials=creds)
              print(">>> V מחובר לגוגל דרייב!")
          except Exception as e:
              print(f">>> X שגיאה בחיבור לגוגל: {e}")
              sys.exit(1)

          # --- המוח: זיהוי חכם ---
          def smart_normalize(name):
              """ הופך שם ל'שלד' לצורך השוואה """
              if not name: return ""
              
              # 1. הסרת מילים גנריות שלא מעניינות
              ignore_words = ['גלריה', 'תיקיה', 'תמונות', 'קבצים', 'של', 'מה', 'copy', 'עותק']
              for word in ignore_words:
                  name = name.replace(word, '')

              # 2. הסרת כל מה שהוא לא אותיות (כולל מספרים!)
              # זה משאיר רק את הטקסט האמיתי: "שיעור תורה" -> "שיעורתורה"
              # "01_שיעור_תורה" -> "שיעורתורה"
              clean = re.sub(r'[^a-zA-Zא-ת]', '', name).lower()
              
              return clean

          def is_similar(name1, name2):
              """ בודק דמיון גם אם יש שגיאות כתיב קלות """
              n1 = smart_normalize(name1)
              n2 = smart_normalize(name2)
              
              # אם אחד מהם ריק אחרי הניקוי (למשל היה רק מספרים), נשווה מקור
              if not n1 or not n2:
                  return name1.strip() == name2.strip()

              # בדיקה מדויקת של השלד
              if n1 == n2: return True
              if n1 in n2 or n2 in n1: return True
              
              # בדיקת דמיון (Fuzzy Matching) - מעל 85% דמיון
              ratio = SequenceMatcher(None, n1, n2).ratio()
              return ratio > 0.85

          # --- ניהול גוגל דרייב ---
          def get_drive_folders():
              print(">>> 📂 טוען רשימת תיקיות מהדרייב (זה ייקח רגע)...")
              folders = []
              page_token = None
              while True:
                  q = f"'{DRIVE_FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false"
                  response = drive_service.files().list(q=q, spaces='drive', fields='nextPageToken, files(id, name)', pageToken=page_token).execute()
                  
                  for file in response.get('files', []):
                      folders.append(file['name'])
                  
                  page_token = response.get('nextPageToken', None)
                  if page_token is None:
                      break
              
              print(f">>> ✅ נטענו {len(folders)} תיקיות מהדרייב.")
              return folders

          # --- בדיקת שם בטרה-בוקס ---
          def get_terabox_name(url):
              # שימוש ב-1024tera למניעת חסימות
              url = url.replace("terabox.com", "1024tera.com").rstrip(').,;]')
              
              short_key = ""
              if 'surl=' in url:
                  try:
                      short_key = '1' + url.split('surl=')[1].split('&')[0]
                  except: pass
              else:
                  short_key = url.split('/')[-1]
              
              if not short_key: return None

              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36",
                  "Referer": "https://www.1024tera.com/",
                  "Accept": "application/json, text/plain, */*"
              }

              try:
                  api_url = f"https://www.1024tera.com/api/shorturlinfo?shorturl={short_key}&root=1"
                  resp = requests.get(api_url, headers=headers, cookies=COOKIE_DICT, timeout=10)
                  data = resp.json()
                  
                  if data.get('errno') != 0: return None
                  file_list = data.get('list', [])
                  if not file_list: return None
                  
                  return file_list[0]['server_filename']

              except: return None

          # --- לוגיקה ראשית ---
          async def main():
              existing_folders = get_drive_folders()
              missing_links = []
              
              print(f"\n=== 🕵️‍♂️ מתחיל סריקה חכמה לאיתור חוסרים ===\n")

              async with TelegramClient('anon', API_ID, API_HASH) as client:
                  scanned = 0
                  async for m in client.iter_messages(MAIN_CHANNEL, limit=LIMIT_MSG):
                      scanned += 1
                      if scanned % 50 == 0: print(f"   ...סרקתי {scanned} הודעות...")

                      text = m.text or ""
                      tera_urls = re.findall(r'(https?://[^\s\)]*(?:terabox|1024tera)[^\s\)]*)', text)
                      
                      if not tera_urls: continue

                      for url in tera_urls:
                          # 1. השגת שם התיקייה בטרה-בוקס
                          tb_name = get_terabox_name(url)
                          
                          if not tb_name:
                              print(f"   ⚠️ דילגתי על קישור לא תקין/פג תוקף: {url}")
                              continue
                          
                          # 2. האם התיקייה קיימת בדרייב? (בדיקה חכמה)
                          found_in_drive = False
                          for drive_name in existing_folders:
                              if is_similar(tb_name, drive_name):
                                  found_in_drive = True
                                  # print(f"   ✅ נמצאה התאמה: '{tb_name}' == '{drive_name}'")
                                  break
                          
                          if not found_in_drive:
                              print(f"   🚨 חסר בדרייב: '{tb_name}'")
                              missing_links.append({"name": tb_name, "url": url, "id": m.id})

              print("\n" + "="*60)
              print(f"📊 סיכום חוסרים:")
              print(f"סה\"כ חסרים: {len(missing_links)} תיקיות")
              print("="*60 + "\n")

              if missing_links:
                  print("👇 העתק את הקישורים האלה (אלו שאין לך בדרייב): 👇\n")
                  for item in missing_links:
                      print(f"📂 {item['name']}")
                      print(f"🔗 {item['url']}")
                      print("-" * 30)
              else:
                  print("🎉 הדרייב שלך מסונכרן מושלם! לא נמצאו חוסרים.")

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: Run Smart Scanner
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          MAIN_CHANNEL: ${{ secrets.MAIN_CHANNEL }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          TERABOX_COOKIES_FILE: ${{ secrets.TERABOX_COOKIES_FILE }}
          PYTHONUNBUFFERED: "1"
        run: python terabox_smart_scanner.py
